<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=Edge" />
<style type="text/css">
__JOMMU_FONT_FACE__
html, body { margin: 0; padding: 0; }
.jmu-page {
  width: 1286px;
  height: 909px;
  position: relative;
  background: #fff;
  overflow: hidden;
  box-sizing: border-box;
}
.jmu-bg {
  position: absolute;
  left: 0;
  top: 0;
  width: 1286px;
  height: 909px;
  z-index: 0;
  pointer-events: none;
  display: block;
}
.jmu-layer {
  position: relative;
  z-index: 1;
  width: 1286px;
  height: 909px;
  box-sizing: border-box;
  font-family: NotoSansCJKjp-Regular_64, "Noto Sans JP", sans-serif;
  color: #000;
}
.jmu-title {
  position: absolute;
  left: 0;
  right: 0;
  top: 10px;
  text-align: center;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 0.22em;
  line-height: 1.2;
}
.jmu-kigen {
  position: absolute;
  right: 40px;
  top: 58px;
  font-size: 14px;
  font-family: NotoSansCJKjp-Regular_64_1, "Noto Sans JP", sans-serif;
  letter-spacing: 0.02em;
}
.jmu-meta {
  position: absolute;
  left: 36px;
  right: 36px;
  top: 92px;
  font-size: 15px;
  line-height: 1.45;
}
.jmu-meta label { color: #000; white-space: nowrap; }
.jmu-meta .v { min-height: 1.2em; word-break: break-all; }
.jmu-meta-row2 {
  display: grid;
  grid-template-columns: 5.5em 1fr 5.5em 1fr 6em 1fr 6em 1fr;
  gap: 4px 8px;
  margin-top: 8px;
  align-items: baseline;
  font-size: 14px;
}
.jmu-clock-row {
  display: flex;
  gap: 20px;
  margin-top: 8px;
  font-size: 15px;
  align-items: baseline;
}
.jmu-tbl-wrap {
  position: absolute;
  left: 30px;
  top: 204px;
  width: 1226px;
}
.jmu-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 14px;
}
.jmu-tbl th {
  font-weight: 600;
  font-size: 11px;
  text-align: center;
  vertical-align: bottom;
  padding: 2px 2px 6px;
  line-height: 1.25;
  background: transparent;
  border: none;
}
.jmu-tbl td {
  border: none;
  padding: 3px 4px;
  vertical-align: middle;
  text-align: left;
  background: transparent;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  height: 34px;
  box-sizing: border-box;
}
.jmu-tbl td.jmu-c { text-align: center; }
.jmu-tbl td.jmu-r { text-align: right; padding-right: 8px; }
.jmu-tbl td.idx { width: 36px; text-align: center; font-size: 13px; }
.jmu-foot {
  position: absolute;
  left: 32px;
  right: 32px;
  bottom: 22px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px 18px;
  font-size: 14px;
}
.jmu-foot .lab { font-size: 13px; }
.jmu-foot .val { min-width: 3.5em; padding: 0 4px; }
</style>
</head>
<body>
<div id="p1" class="jmu-page">
  <img class="jmu-bg" width="1286" height="909" alt="" src="__JOMMU_BG__" />
  <div class="jmu-layer">
__JOMMU_MAIN__
  </div>
</div>
</body>
</html>
